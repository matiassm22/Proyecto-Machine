<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Task Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .task {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      margin-right: 10px;
      padding: 5px 10px;
      cursor: pointer;
    }

    .done {
      text-decoration: line-through;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<h1>📋 Mis Tareas</h1>

<div id="tasks"></div>

<script>
async function loadTasks() {
  const res = await fetch('http://localhost:3000/tasks');
  const tasks = await res.json();

  const container = document.getElementById('tasks');
  container.innerHTML = '';

  tasks.forEach(task => {
    const div = document.createElement('div');
    div.className = 'task';

    if (task.estado === 'completado') {
      div.classList.add('done');
    }

    div.innerHTML = `
      <strong>${task.titulo}</strong><br>
      📅 ${task.fecha || 'Sin fecha'}<br>
      ⏰ ${task.hora || 'Sin hora'}<br>
      📍 ${task.ubicacion || 'Sin ubicación'}<br>
    

      <button onclick="completeTask('${task.id}')">✔ Completar</button>
      <button onclick="deleteTask('${task.id}')">❌ Eliminar</button>
    `;

    container.appendChild(div);
  });
}

async function completeTask(id) {
  await fetch(`http://localhost:3000/tasks/${id}`, {
    method: 'PATCH'
  });

  loadTasks();
}

async function deleteTask(id) {
  await fetch(`http://localhost:3000/tasks/${id}`, {
    method: 'DELETE'
  });

  loadTasks();
}

loadTasks();
</script>

</body>
</html>
